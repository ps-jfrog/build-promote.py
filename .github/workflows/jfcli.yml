name: "JF-CLI: Build Promote"
on:
  push:
    branches: 
      - '**'
permissions:
  actions: read # for detecting the Github Actions environment.
  id-token: write # for creating OIDC tokens for signing.
  packages: write # for uploading attestations.
  contents: read
  security-events: write # Required for uploading code scanning.
env:
  JF_RT_URL: "https://psazuse.jfrog.io"
  JOB_SUMMARY: false
  JFROG_CLI_LOG_LEVEL: DEBUG # DEBUG, INFO, WARN, ERROR
  DEFAULT_WORKSPACE: "${{github.workspace}}" 
  BUILD_ID: "${{github.run_number}}.0"
  BUILD_NAME: "py-bpr-app" 
  MODULE_NAME: "py-artifacts"
  RT_REPO_VIRTUAL: "py-bpr-virtual"
  RT_REPO_LOCAL_INIT: "py-bpr-init-local"
  RT_REPO_LOCAL_DEV: "py-bpr-dev-local"
  RT_REPO_LOCAL_QA: "py-bpr-qa-local"
  RT_REPO_LOCAL_PROD: "py-bpr-prod-local"
  RT_REPO_REMOTE: "pypi-remote"

jobs:
  buildPublish: 
    name: "Create Build and Publish"
    runs-on: ubuntu-latest
    env:
      BAD_DEPS_DIR: "${{ github.workspace }}/.jfrog/bad-deps"
    defaults:
        run:
          working-directory: "${{env.DEFAULT_WORKSPACE}}"
    steps:
        - name: "Setup JFrog CLI"
          uses: jfrog/setup-jfrog-cli@v4  # 
          id: jfrog-cli
          env:
            JF_URL: ${{env.JF_RT_URL}}
            JFROG_CLI_LOG_LEVEL: "DEBUG"
          with:
            version: latest 
            oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}
            disable-job-summary: ${{env.JOB_SUMMARY}}

        - name: Checkout
          uses: actions/checkout@v6

        - name: "Folder list"
          run: | 
              tree .

        - name: "JF Show"
          run: | 
              jf c s

        - name: "Setup Summary"
          run: |
            echo "# :frog: Setup Summary :pushpin:" >> $GITHUB_STEP_SUMMARY
            echo " " >> $GITHUB_STEP_SUMMARY
            echo " " >> $GITHUB_STEP_SUMMARY
            echo " - Installed JFrog CLI [$(jf --version)](https://jfrog.com/getcli/) " >> $GITHUB_STEP_SUMMARY
            echo "    - $(jf --version) " >> $GITHUB_STEP_SUMMARY
            echo "    - $(python3 -V) " >> $GITHUB_STEP_SUMMARY
            echo "    - $(pip3 -V) " >> $GITHUB_STEP_SUMMARY
            echo " " >> $GITHUB_STEP_SUMMARY
            echo " " >> $GITHUB_STEP_SUMMARY
            
        - name: "Create pip config"
          run: |
            jf pipc --repo-deploy="${{env.RT_REPO_VIRTUAL}}" --repo-resolve="${{env.RT_REPO_VIRTUAL}}"

        - name: "Xray: audit"
          run: |
            jf audit --pip --requirements-file=requirements.txt --threads=100 --format=table --extended-table --vuln --validate-secrets --sca --secrets

        - name: "Install dependencies (environment)"
          run: |
            jf pip install -r requirements.txt --build-name="${{env.BUILD_NAME}}" --build-number="${{env.BUILD_ID}}" --module="${{env.MODULE_NAME}}"

        - name: "Download requirements closure (direct + transitive for build-add-dependencies)"
          run: |
            set -euo pipefail
            mkdir -p "${BAD_DEPS_DIR}"
            jf pip download -r requirements.txt -d "${BAD_DEPS_DIR}"

        - name: "Build info"
          run: |
            jf rt bag "${{env.BUILD_NAME}}" "${{env.BUILD_ID}}"
            jf rt bce "${{env.BUILD_NAME}}" "${{env.BUILD_ID}}"
            jf rt bad "${{env.BUILD_NAME}}" "${{env.BUILD_ID}}" --module="${{env.MODULE_NAME}}" "${BAD_DEPS_DIR}/*"
            jf rt bp "${{env.BUILD_NAME}}" "${{env.BUILD_ID}}" --detailed-summary=true

        - name: "Xray: Build Scan"
          continue-on-error: true
          run: |
            jf bs ${{env.BUILD_NAME}} ${{env.BUILD_ID}} --format=table --extended-table --vuln --rescan

  promoteBuildToDev:
    name: "INIT to DEV local"
    runs-on: ubuntu-latest
    needs: buildPublish
    defaults:
      run:
        working-directory: "${{ env.DEFAULT_WORKSPACE }}"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JF_RT_URL }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: latest
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER_NAME }}
          disable-job-summary: ${{ env.JOB_SUMMARY }}

      - name: "BP: INIT → DEV local"
        env:
          STATUS_COMMENT: "Promoting: INIT → DEV"
        run: |
          set -euo pipefail
          jf rt bpr "${{ env.BUILD_NAME }}" "${{ env.BUILD_ID }}" "${{ env.RT_REPO_LOCAL_DEV }}" \
            --status="${STATUS_COMMENT}" \
            --include-dependencies \
            --copy

      - name: "Xray: Build Scan"
        continue-on-error: true
        run: |
          jf bs ${{env.BUILD_NAME}} ${{env.BUILD_ID}} --format=table --extended-table --vuln --rescan

      - name: "Sleep to Sync"
        run: |
          sleep 2

  promoteBuildToQA: 
    name: "DEV to QA"
    runs-on: ubuntu-latest
    needs: promoteBuildToDev
    defaults:
      run:
        working-directory: "${{env.DEFAULT_WORKSPACE}}"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog-cli
        env:
          JF_URL: ${{env.JF_RT_URL}}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: latest 
          oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}
          disable-job-summary: ${{env.JOB_SUMMARY}}
        
      - name: "BP: DEV → QA local"
        env:
          STATUS_COMMENT: "Promoting: DEV → QA"
        run: |
          jf rt bpr ${{env.BUILD_NAME}} ${{env.BUILD_ID}} ${{env.RT_REPO_LOCAL_QA}} --status="${{env.STATUS_COMMENT}}" --include-dependencies --copy

      - name: "Xray: Build Scan"
        continue-on-error: true
        run: |
          jf bs ${{env.BUILD_NAME}} ${{env.BUILD_ID}} --format=table --extended-table --vuln --rescan
      
      - name: "Sleep to Sync"
        run: |
          sleep 2

  promoteBuildToProd: 
    name: "Promote Build to Prod"
    runs-on: ubuntu-latest
    needs: promoteBuildToQA
    defaults:
      run:
        working-directory: "${{env.DEFAULT_WORKSPACE}}"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog-cli
        env:
          JF_URL: ${{env.JF_RT_URL}}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: latest 
          oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}
          disable-job-summary: ${{env.JOB_SUMMARY}}
      
      - name: "BP: QA → Prod local"
        env:
          STATUS_COMMENT: "Promoting: QA → Prod"
        run: |
          jf rt bpr ${{env.BUILD_NAME}} ${{env.BUILD_ID}} ${{env.RT_REPO_LOCAL_PROD}} --status="${{env.STATUS_COMMENT}}" --include-dependencies --copy

      - name: "Xray: Build Scan"
        continue-on-error: true
        run: |
          jf bs ${{env.BUILD_NAME}} ${{env.BUILD_ID}} --format=table --extended-table --vuln --rescan

      - name: "Sleep to Sync"
        run: |
          sleep 2

  # Mirrors jfcli.sh: validate after bpr to dev-local (repo-root path, --include-deps=true, props fallback).
  validateDownloadDevLocal:
    name: "Validate download (dev-local)"
    runs-on: ubuntu-latest
    needs: promoteBuildToDev
    env:
      VALIDATE_DL_DIR: "${{ github.workspace }}/validate-dl-dev-local"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JF_RT_URL }}
        with:
          version: latest
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER_NAME }}
          disable-job-summary: true

      - name: "Validate download from dev-local"
        run: |
          set -euo pipefail
          sleep 2
          rm -rf "${VALIDATE_DL_DIR}"
          mkdir -p "${VALIDATE_DL_DIR}"
          echo "*** Validate download: ${RT_REPO_LOCAL_DEV} (build ${BUILD_NAME} / ${BUILD_ID}) ***"
          echo "Search (first matches):"
          jf rt search \
            --build="${BUILD_NAME}/${BUILD_ID}" \
            --include-deps=true \
            "${RT_REPO_LOCAL_DEV}/" | head -50 || true

          _download_ok=0
          if jf rt download \
            --build="${BUILD_NAME}/${BUILD_ID}" \
            --include-deps=true \
            --flat=true \
            --fail-no-op=true \
            --detailed-summary=true \
            "${RT_REPO_LOCAL_DEV}/" \
            "${VALIDATE_DL_DIR}/"
          then
            _download_ok=1
          else
            echo "::warning::download with --build failed; retrying with build.name / build.number properties..."
            if jf rt download \
              --props="build.name=${BUILD_NAME};build.number=${BUILD_ID}" \
              --flat=true \
              --fail-no-op=true \
              --detailed-summary=true \
              "${RT_REPO_LOCAL_DEV}/" \
              "${VALIDATE_DL_DIR}/"
            then
              _download_ok=1
            fi
          fi

          if [[ "${_download_ok}" -ne 1 ]]; then
            echo "::error::jf rt download found no files in ${RT_REPO_LOCAL_DEV} for build ${BUILD_NAME}/${BUILD_ID}. Confirm bpr to dev-local and artifact build properties."
            exit 1
          fi
          n="$(find "${VALIDATE_DL_DIR}" -type f | wc -l | tr -d ' ')"
          if [[ "${n}" -lt 1 ]]; then
            echo "::error::no files under ${VALIDATE_DL_DIR} for build ${BUILD_NAME}/${BUILD_ID}"
            exit 1
          fi
          echo "OK: ${n} file(s) → ${{env.VALIDATE_DL_DIR}}"
          echo ""
          echo "Downloaded files (${{env.VALIDATE_DL_DIR}}):"
          find "${{env.VALIDATE_DL_DIR}}" -type f -print | sort
          {
            echo "## Validate download — ${{env.RT_REPO_LOCAL_DEV}}"
            echo ""
            echo "- **Build:** \`${{env.BUILD_NAME}}\` / \`${{env.BUILD_ID}}\`"
            echo "- **Files downloaded:** ${n}"
            echo ""
            echo "### Folder ${{env.VALIDATE_DL_DIR}} content after download"
            echo ""
            echo '```'
            find "${{env.VALIDATE_DL_DIR}}" -type f | sort
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  validateDownloadQaLocal:
    name: "Validate download (qa-local)"
    runs-on: ubuntu-latest
    needs: promoteBuildToQA
    env:
      VALIDATE_DL_DIR: "${{ github.workspace }}/validate-dl-qa-local"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JF_RT_URL }}
        with:
          version: latest
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER_NAME }}
          disable-job-summary: true

      - name: "Download artifacts for build from qa-local"
        run: |
          set -euo pipefail
          mkdir -p "${{env.VALIDATE_DL_DIR}}"
          echo "Search (qa-local):"
          jf rt search --build="${{env.BUILD_NAME}}/${{env.BUILD_ID}}" --include-deps=true "${{env.RT_REPO_LOCAL_QA}}/" | head -50 || true
          jf rt download \
            --build="${{env.BUILD_NAME}}/${{env.BUILD_ID}}" \
            --include-deps=true \
            --flat=true \
            --fail-no-op=true \
            --detailed-summary=true \
            "${{env.RT_REPO_LOCAL_QA}}/" \
            "${{env.VALIDATE_DL_DIR}}/"
          n="$(find "${{env.VALIDATE_DL_DIR}}" -type f | wc -l | tr -d ' ')"
          if [[ "${n}" -lt 1 ]]; then
            echo "::error::No files in ${{env.RT_REPO_LOCAL_QA}} for build ${{env.BUILD_NAME}}/${{env.BUILD_ID}}. Check bpr --copy and build properties on promoted artifacts."
            exit 1
          fi
          echo "OK: ${n} file(s) → ${{env.VALIDATE_DL_DIR}}"
          echo ""
          echo "Downloaded files (${{env.VALIDATE_DL_DIR}}):"
          find "${{env.VALIDATE_DL_DIR}}" -type f -print | sort
          {
            echo "## Validate download — ${{env.RT_REPO_LOCAL_QA}}"
            echo ""
            echo "- **Build:** \`${{env.BUILD_NAME}}\` / \`${{env.BUILD_ID}}\`"
            echo "- **Files downloaded:** ${n}"
            echo ""
            echo "### Folder ${{env.VALIDATE_DL_DIR}} content after download"
            echo ""
            echo '```'
            find "${{env.VALIDATE_DL_DIR}}" -type f | sort
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  validateDownloadProdLocal:
    name: "Validate download (prod-local)"
    runs-on: ubuntu-latest
    needs: promoteBuildToProd
    env:
      VALIDATE_DL_DIR: "${{ github.workspace }}/validate-dl-prod-local"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JF_RT_URL }}
        with:
          version: latest
          oidc-provider-name: ${{ vars.JF_OIDC_PROVIDER_NAME }}
          disable-job-summary: true

      - name: "Download artifacts for build from prod-local"
        run: |
          set -euo pipefail
          mkdir -p "${{env.VALIDATE_DL_DIR}}"
          echo "Search (prod-local):"
          jf rt search --build="${{env.BUILD_NAME}}/${{env.BUILD_ID}}" --include-deps=true "${{env.RT_REPO_LOCAL_PROD}}/" | head -50 || true
          jf rt download \
            --build="${{env.BUILD_NAME}}/${{env.BUILD_ID}}" \
            --include-deps=true \
            --flat=true \
            --fail-no-op=true \
            --detailed-summary=true \
            "${{env.RT_REPO_LOCAL_PROD}}/" \
            "${{env.VALIDATE_DL_DIR}}/"
          n="$(find "${{env.VALIDATE_DL_DIR}}" -type f | wc -l | tr -d ' ')"
          if [[ "${n}" -lt 1 ]]; then
            echo "::error::No files in ${{env.RT_REPO_LOCAL_PROD}} for build ${{env.BUILD_NAME}}/${{env.BUILD_ID}}. Check bpr --copy and build properties."
            exit 1
          fi
          echo "OK: ${n} file(s) → ${{env.VALIDATE_DL_DIR}}"
          echo ""
          echo "Downloaded files (${{env.VALIDATE_DL_DIR}}):"
          find "${{env.VALIDATE_DL_DIR}}" -type f -print | sort
          {
            echo "## Validate download — ${{env.RT_REPO_LOCAL_PROD}}"
            echo ""
            echo "- **Build:** \`${{env.BUILD_NAME}}\` / \`${{env.BUILD_ID}}\`"
            echo "- **Files downloaded:** ${n}"
            echo ""
            echo "### Folder ${{env.VALIDATE_DL_DIR}} content after download"
            echo ""
            echo '```'
            find "${{env.VALIDATE_DL_DIR}}" -type f | sort
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  promoteSummary:
    name: "Promote Summary"
    runs-on: ubuntu-latest
    needs:
      - promoteBuildToProd
      - validateDownloadDevLocal
      - validateDownloadQaLocal
      - validateDownloadProdLocal
    env:
      PROMOTE_CHECKOUT_DIR: "${{github.workspace}}/promote-checkout"
    steps:
        - name: "Setup JFrog CLI"
          uses: jfrog/setup-jfrog-cli@v4
          env:
            JF_URL: ${{env.JF_RT_URL}}
          with:
            version: latest
            oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}
            disable-job-summary: true

        - name: "Build API + checkout (prod-local)"
          run: |
            set -euo pipefail
            mkdir -p "${{env.PROMOTE_CHECKOUT_DIR}}/files"
            API_OK=0
            if jf rt curl -sf "api/build/${{env.BUILD_NAME}}/${{env.BUILD_ID}}" > "${{env.PROMOTE_CHECKOUT_DIR}}/build-info.json"; then
              API_OK=1
            else
              echo "::warning::api/build request failed"
            fi

            BF="${{env.PROMOTE_CHECKOUT_DIR}}/build-info.json"
            cat "${BF}"
            if [[ "${API_OK}" -eq 1 ]] && jq empty "${BF}" 2>/dev/null; then
              {
                echo "## Promotion statuses (buildInfo.statuses)"
                echo ""
                echo "| Timestamp (UTC) | Status "
                echo "|-----------------|--------|"
                jq -r '
                  def fmt_ts:
                    if . == null or . == "" then "—"
                    elif type == "string" and test("^[0-9]+$") then (tonumber / 1000 | strftime("%Y-%m-%d %H:%M:%S UTC"))
                    elif type == "number" then (. / 1000 | strftime("%Y-%m-%d %H:%M:%S UTC"))
                    else tostring end;
                  (.buildInfo // .).statuses // []
                  | .[]
                  | "| \((.timestamp | fmt_ts)) | \(.status // "—") |"
                ' "${BF}"
                echo ""
              } > "${{env.PROMOTE_CHECKOUT_DIR}}/build-api-summary.md"
            else
              {
                echo "## Build API status"
                echo ""
                echo "_Could not load or parse \`api/build/${{env.BUILD_NAME}}/${{env.BUILD_ID}}\` (empty response, non-JSON, or curl failed)._"
                echo ""
              } > "${{env.PROMOTE_CHECKOUT_DIR}}/build-api-summary.md"
            fi

            echo "--- build-api-summary.md ---"
            cat "${{env.PROMOTE_CHECKOUT_DIR}}/build-api-summary.md"

            jf rt search \
              --build="${{env.BUILD_NAME}}/${{env.BUILD_ID}}" \
              --include-deps=true \
              "${{env.RT_REPO_LOCAL_PROD}}/" \
              | tee "${{env.PROMOTE_CHECKOUT_DIR}}/promoted-artifacts-search.json"
            jf rt download \
              --build="${{env.BUILD_NAME}}/${{env.BUILD_ID}}" \
              --include-deps=true \
              --flat=true \
              --detailed-summary=true \
              "${{env.RT_REPO_LOCAL_PROD}}/" \
              "${{env.PROMOTE_CHECKOUT_DIR}}/files/"

        - name: "Promote Summary (job summary)"
          run: |
            {
              echo "# :frog: Promote pipeline summary"
              echo ""
              echo "Build **\`${{env.BUILD_NAME}}\`** / **\`${{env.BUILD_ID}}\`** - promotion summary."
              echo ""
              cat "${{env.PROMOTE_CHECKOUT_DIR}}/build-api-summary.md"
              echo ""
              
            } >> "${GITHUB_STEP_SUMMARY}"
